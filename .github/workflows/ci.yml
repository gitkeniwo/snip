name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  quality:
    name: quality (stable)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo clippy --locked --all-targets --no-default-features -- -D warnings

  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-stable-full
            os: ubuntu-24.04
            toolchain: stable
            cargo_args: --all-features
          - name: linux-msrv-full
            os: ubuntu-24.04
            toolchain: 1.89.0
            cargo_args: --all-features
          - name: linux-stable-slim
            os: ubuntu-24.04
            toolchain: stable
            cargo_args: --no-default-features
          - name: macos-arm64-full
            os: macos-latest
            toolchain: stable
            cargo_args: --all-features
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
      - run: cargo test --locked ${{ matrix.cargo_args }}
