name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build:
    name: build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: snip-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            asset: snip-aarch64-unknown-linux-gnu
          - os: macos-latest
            asset: snip-aarch64-apple-darwin
          - os: macos-15-intel
            asset: snip-x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.asset }}
      - run: cargo build --locked --release --all-features
      - run: ./target/release/snip --version
      - name: Create portable archive
        run: tar -C target/release -czf ${{ matrix.asset }}.tar.gz snip
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error
          retention-days: 14
